name: Bug report
description: Something doesn't work the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For security issues (anything that could bypass the
        human-only completion boundary), please use SECURITY.md instead of a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, and what went wrong?
      placeholder: I ran `agentklar gate AK-1` and ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands help a lot.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or the release tag.
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS (arm64)
        - macOS (x64)
        - Linux (arm64)
        - Linux (x64)
        - Other
